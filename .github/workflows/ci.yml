name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.12.3'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('requirements-dev.txt') }}
      - run: pip install -r requirements-dev.txt
      - run: ruff check . --no-fix
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: scam_test
          POSTGRES_USER: wends23
          POSTGRES_PASSWORD: scam2024pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Migration check
        env:
          DATABASE_URL: postgres://wends23:scam2024pass@localhost:5432/scam_test
          REDIS_URL: redis://localhost:6379/1
          SECRET_KEY: ci-test-key-not-for-production
          TELEGRAM_BOT_TOKEN: dummy:token
        run: |
          python manage.py makemigrations --check --dry-run
          python manage.py seed_missions

      - name: Static files check
        env:
          DATABASE_URL: postgres://wends23:scam2024pass@localhost:5432/scam_test
          REDIS_URL: redis://localhost:6379/1
          SECRET_KEY: ci-test-key-not-for-production
          TELEGRAM_BOT_TOKEN: dummy:token
        run: python manage.py collectstatic --no-input --dry-run

      - name: Run checks & tests
        env:
          DATABASE_URL: postgres://wends23:scam2024pass@localhost:5432/scam_test
          REDIS_URL: redis://localhost:6379/1
          SECRET_KEY: ci-test-key-not-for-production
          TELEGRAM_BOT_TOKEN: dummy:token
        run: |
          python manage.py check --deploy
          coverage run manage.py test --no-input --parallel
          coverage report

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t gaintime:latest .
