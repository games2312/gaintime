{% extends 'core/admin/admin_base.html' %}
{% block title %}Ajouter une annonce - Admin{% endblock %}
{% block content %}
<div class="mb-6 mt-4 px-2">
    <a href="{% url 'admin_announcements' %}" class="text-blue-600 text-xs mb-1 block"><i class="fas fa-arrow-left mr-1"></i> Retour</a>
    <h2 class="text-xl font-bold text-gray-800">Nouvelle annonce</h2>
</div>
<form method="POST" class="px-2 space-y-4">
    {% csrf_token %}
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Titre</label>
        <input type="text" name="title" required class="w-full px-4 py-3 rounded-2xl border border-gray-200 focus:border-red-500 focus:outline-none text-sm">
    </div>
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Message</label>
        <textarea name="message" rows="4" required class="w-full px-4 py-3 rounded-2xl border border-gray-200 focus:border-red-500 focus:outline-none text-sm"></textarea>
    </div>
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Lien (optionnel)</label>
        <input type="url" name="link" class="w-full px-4 py-3 rounded-2xl border border-gray-200 focus:border-red-500 focus:outline-none text-sm" placeholder="https://...">
    </div>
    <button type="submit" class="w-full bg-red-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-red-200">Publier</button>
</form>
{% endblock %}
