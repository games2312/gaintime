{% extends 'core/base.html' %}
{% block title %}Mot de passe oublié - GainTime{% endblock %}
{% block content %}
<div class="min-h-[70vh] flex flex-col items-center justify-center px-4">
    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8 border border-gray-100">
        <h2 class="text-2xl font-bold text-gray-800 text-center mb-6">Mot de passe oublié</h2>
        <form method="POST" class="space-y-6">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Numéro de téléphone</label>
                <input type="text" name="phone_number" required placeholder="6XXXXXXXX"
                       class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none transition">
            </div>
            <button type="submit" class="w-full bg-purple-600 text-white font-bold py-3 rounded-xl shadow-lg hover:bg-purple-700 transition">
                DEMANDER UN CODE
            </button>
        </form>
        <div class="mt-6 text-center">
            <a href="{% url 'login' %}" class="text-purple-600 text-sm font-bold">Retour à la connexion</a>
        </div>
    </div>
</div>
{% endblock %}
