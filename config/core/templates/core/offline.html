{% extends 'core/base.html' %}
{% load i18n %}
{% block title %}Hors ligne - GainTime{% endblock %}
{% block content %}
<div class="flex flex-col items-center justify-center min-h-[60vh] text-center space-y-4 fade-in-up">
    <div class="w-20 h-20 rounded-full bg-white/5 flex items-center justify-center">
        <i class="fas fa-wifi-slash text-4xl text-muted"></i>
    </div>
    <h1 class="text-xl font-black">{% trans "Vous êtes hors ligne" %}</h1>
    <p class="text-sm text-muted max-w-xs">{% trans "Vérifiez votre connexion et réessayez. Certaines fonctionnalités restent accessibles." %}</p>
    <button onclick="location.reload()" class="gold-gradient text-white font-black text-xs px-8 py-3 rounded-xl">
        <i class="fas fa-redo mr-2"></i>{% trans "Réessayer" %}
    </button>
</div>
{% endblock %}
