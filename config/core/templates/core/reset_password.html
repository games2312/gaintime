{% extends 'core/base.html' %}
{% block title %}Réinitialiser le mot de passe - GainTime{% endblock %}
{% block content %}
<div class="min-h-[70vh] flex flex-col items-center justify-center px-4">
    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8 border border-gray-100">
        <h2 class="text-2xl font-bold text-gray-800 text-center mb-6">Nouveau mot de passe</h2>
        <form method="POST" class="space-y-6">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Code OTP</label>
                <input type="text" name="otp_code" required placeholder="000000" maxlength="6"
                       class="w-full px-4 py-3 rounded-xl border border-gray-200 text-center font-bold tracking-widest focus:ring-2 focus:ring-purple-500 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Nouveau mot de passe</label>
                <input type="password" name="new_password" required placeholder="********"
                       class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-purple-500 outline-none transition">
            </div>
            <button type="submit" class="w-full bg-purple-600 text-white font-bold py-3 rounded-xl shadow-lg hover:bg-purple-700 transition">
                RÉINITIALISER
            </button>
        </form>
    </div>
</div>
{% endblock %}
